<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://fowpadrwpuuwugskzauj.supabase.co https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;">
    <title>Vorschau – Digitale Visitenkarte</title>
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" href="./themes/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body class="linktree-body">
    <div id="preview-loading" style="position:fixed; inset:0; background:rgba(6,23,30,0.95); z-index:99999; display:flex; align-items:center; justify-content:center; color:white; font-family:sans-serif; transition:opacity 0.3s;">Lädt Vorschau...</div>
    
    <div id="preview-banner" style="display:none; position:fixed; top:0; left:0; right:0; background-color:rgba(42,225,232,0.12); border-bottom:1px solid rgba(42,225,232,0.5); color:#2AE1E8; text-align:center; padding:10px 20px; font-size:0.85rem; font-family:sans-serif; letter-spacing:0.04em; z-index:9999; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);"></div>

    <main class="linktree-container">
        <div id="profile-container" class="linktree-profile"></div>
        <div id="video-container"></div>
        <div id="links-container" class="linktree-links"></div>
        <footer class="legal-footer">
            <a href="/impressum.html">Impressum</a> <span>|</span> <a href="/datenschutz.html">Datenschutz</a>
        </footer>
    </main>

    <script src="./auth.js"></script>
    <script src="./render.js"></script>
    <script>
        function loadThemeCSS(theme) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = './themes/' + (theme || 'darkgreen') + '.css';
            document.head.appendChild(link);
        }

        function showBanner() {
            const banner = document.getElementById('preview-banner');
            banner.textContent = 'Vorschau – ungespeicherte Änderungen';
            banner.style.display = 'block';
            document.querySelector('.linktree-container').style.marginTop = '80px';
        }

        function hideLoading() {
            const loader = document.getElementById('preview-loading');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 300); }
        }

        function isValidTreeData(td) {
            return td && typeof td === 'object' &&
                   (!td.theme || typeof td.theme === 'string') &&
                   (!td.profile || typeof td.profile === 'object') &&
                   (!td.socialIcons || Array.isArray(td.socialIcons)) &&
                   (!td.videoModule || typeof td.videoModule === 'object') &&
                   (!td.links || Array.isArray(td.links));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireAuth();
            if (!session) {
                const loader = document.getElementById('preview-loading');
                if (loader) loader.textContent = 'Bitte einloggen…';
                return; 
            }
            const user = session.user;
            const client = await getAuthenticatedClient();

            const liveRaw = sessionStorage.getItem('visitenkarte_preview');
            if (liveRaw) {
                sessionStorage.removeItem('visitenkarte_preview'); 
                try {
                    const td = JSON.parse(liveRaw);
                    if (!isValidTreeData(td)) throw new Error('Ungültig');
                    loadThemeCSS(td.theme);
                    showBanner();
                    if (td.profile)     renderProfile(td.profile);
                    if (td.socialIcons) renderSocialIcons(td.socialIcons);
                    if (td.videoModule) renderVideoModule(td.videoModule);
                    if (td.links)       renderLinks(td.links);
                    hideLoading();
                    return;
                } catch (e) { console.warn('Preview verworfen', e); }
            }

            try {
                const { data, error } = await client.from('profiles').select('tree_data').eq('user_id', user.id).limit(1).single();
                if (error) throw error;
                if (data && data.tree_data) {
                    const td = data.tree_data;
                    loadThemeCSS(td.theme);
                    if (td.profile)     renderProfile(td.profile);
                    if (td.socialIcons) renderSocialIcons(td.socialIcons);
                    if (td.videoModule) renderVideoModule(td.videoModule);
                    if (td.links)       renderLinks(td.links);
                }
            } catch (err) {
                console.error('Ladefehler:', err);
                loadThemeCSS('darkgreen');
                const main = document.querySelector('.linktree-container');
                if(main) main.insertAdjacentHTML('afterbegin', '<p style="color:#e88080;text-align:center;padding:20px;">Daten konnten nicht geladen werden.</p>');
            }
            hideLoading();
        });
    </script>
</body>
</html>
