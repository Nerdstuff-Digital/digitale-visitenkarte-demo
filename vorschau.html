<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vorschau – Digitale Visitenkarte</title>
    <link rel="stylesheet" href="./themes/darkgreen.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="linktree-body">

    <div class="preview-banner" id="preview-banner" style="display:none;">
        Vorschau – ungespeicherte Änderungen
    </div>

    <main class="linktree-container">
        <div id="profile-container" class="linktree-profile"></div>
        <div id="video-container"></div>
        <div id="links-container" class="linktree-links"></div>

        <footer class="legal-footer">
            <a href="#">Impressum</a> <span>|</span> <a href="#">Datenschutz</a>
        </footer>
    </main>

    <script src="./render.js"></script>
    <script>
        const SUPABASE_URL = 'https://fowpadrwpuuwugskzauj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6vNM_zVfFfcCjaI5TQRbWQ_X6swaIFk';

        document.addEventListener('DOMContentLoaded', async () => {
            const liveRaw = localStorage.getItem('visitenkarte_preview');

            if (liveRaw) {
                try {
                    const treeData = JSON.parse(liveRaw);
                    document.getElementById('preview-banner').style.display = 'block';
                    if (treeData.profile)     renderProfile(treeData.profile);
                    if (treeData.socialIcons) renderSocialIcons(treeData.socialIcons);
                    if (treeData.videoModule) renderVideoModule(treeData.videoModule);
                    if (treeData.links)       renderLinks(treeData.links);
                    return;
                } catch (e) {}
            }

            const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            try {
                const { data, error } = await client
                    .from('profiles')
                    .select('tree_data')
                    .limit(1)
                    .single();
                if (error) throw error;
                if (data && data.tree_data) {
                    const td = data.tree_data;
                    if (td.profile)     renderProfile(td.profile);
                    if (td.socialIcons) renderSocialIcons(td.socialIcons);
                    if (td.videoModule) renderVideoModule(td.videoModule);
                    if (td.links)       renderLinks(td.links);
                }
            } catch (err) {
                console.error('Fehler beim Laden:', err);
            }
        });
    </script>

</body>
</html>
