<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vorschau – Digitale Visitenkarte</title>
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" href="./themes/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="linktree-body">
    <div id="preview-banner" style="display:none; position:fixed; top:0; left:0; right:0; background-color:rgba(42,225,232,0.12); border-bottom:1px solid rgba(42,225,232,0.5); color:#2AE1E8; text-align:center; padding:10px 20px; font-size:0.85rem; font-family:sans-serif; letter-spacing:0.04em; z-index:9999; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);"></div>

    <main class="linktree-container">
        <div id="profile-container" class="linktree-profile"></div>
        <div id="video-container"></div>
        <div id="links-container" class="linktree-links"></div>
        <footer class="legal-footer">
            <a href="#">Impressum</a> <span>|</span> <a href="#">Datenschutz</a>
        </footer>
    </main>

    <script src="./render.js"></script>
    <script>
        const SUPABASE_URL = 'https://fowpadrwpuuwugskzauj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6vNM_zVfFfcCjaI5TQRbWQ_X6swaIFk';

        function loadThemeCSS(theme) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = './themes/' + (theme || 'darkgreen') + '.css';
            document.head.appendChild(link);
        }

        function showBanner() {
            const banner = document.getElementById('preview-banner');
            banner.textContent = 'Vorschau – ungespeicherte Änderungen';
            banner.style.display = 'block';
            document.querySelector('.linktree-container').style.marginTop = '80px';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const liveRaw = localStorage.getItem('visitenkarte_preview');
            if (liveRaw) {
                try {
                    const td = JSON.parse(liveRaw);
                    loadThemeCSS(td.theme);
                    showBanner();
                    if (td.profile)     renderProfile(td.profile);
                    if (td.socialIcons) renderSocialIcons(td.socialIcons);
                    if (td.videoModule) renderVideoModule(td.videoModule);
                    if (td.links)       renderLinks(td.links);
                    return;
                } catch (e) {}
            }

            const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            try {
                const { data, error } = await client.from('profiles').select('tree_data').limit(1).single();
                if (error) throw error;
                if (data && data.tree_data) {
                    const td = data.tree_data;
                    loadThemeCSS(td.theme);
                    if (td.profile)     renderProfile(td.profile);
                    if (td.socialIcons) renderSocialIcons(td.socialIcons);
                    if (td.videoModule) renderVideoModule(td.videoModule);
                    if (td.links)       renderLinks(td.links);
                }
            } catch (err) {
                console.error('Fehler beim Laden:', err);
                loadThemeCSS('darkgreen');
            }
        });
    </script>

    <script>
        (function() {
            var body = document.body;
            var startY = 0;
            var pullY = 0;
            var pulling = false;
            var ease = 0.4;
            var maxPull = 80;

            function applyTransform(y) {
                body.style.transform = 'translateY(' + y + 'px)';
            }

            function snapBack() {
                body.style.transition = 'transform 0.45s cubic-bezier(0.23, 1, 0.32, 1)';
                body.style.transform = 'translateY(0)';
                setTimeout(function() { body.style.transition = ''; }, 450);
            }

            document.addEventListener('touchstart', function(e) {
                startY = e.touches[0].clientY;
                pulling = false;
                pullY = 0;
            }, { passive: true });

            document.addEventListener('touchmove', function(e) {
                var y = e.touches[0].clientY;
                var delta = y - startY;
                var scrollTop = window.scrollY || document.documentElement.scrollTop;
                var atTop = scrollTop <= 0 && delta > 0;
                var atBottom = (window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 1 && delta < 0;

                if (atTop || atBottom) {
                    pulling = true;
                    pullY = delta * ease;
                    if (pullY > maxPull) pullY = maxPull;
                    if (pullY < -maxPull) pullY = -maxPull;
                    applyTransform(pullY);
                }
            }, { passive: true });

            document.addEventListener('touchend', function() {
                if (pulling) {
                    snapBack();
                    pulling = false;
                }
            }, { passive: true });
        })();
    </script>
</body>
</html>
