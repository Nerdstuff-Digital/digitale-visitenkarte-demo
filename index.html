<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://fowpadrwpuuwugskzauj.supabase.co https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;">
    <title>Digitale Visitenkarte</title>
    <base href="/">
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" href="./themes/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body class="linktree-body">
    <main class="linktree-container">
        <button id="share-btn" class="action-btn top-right" aria-label="Teilen">
            <img src="./icons/share.svg" alt="" class="custom-icon">
        </button>        
        <div id="profile-container" class="linktree-profile"></div>
        <div id="video-container"></div>
        <div id="links-container" class="linktree-links"></div>
        <footer class="legal-footer">
            <a href="/impressum.html">Impressum</a> <span>|</span> <a href="/datenschutz.html">Datenschutz</a>
        </footer>
    </main>

    <script src="./render.js"></script>
    <script>
        const SUPABASE_URL = 'https://fowpadrwpuuwugskzauj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6vNM_zVfFfcCjaI5TQRbWQ_X6swaIFk';

        function loadThemeCSS(theme) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = './themes/' + (theme || 'darkgreen') + '.css';
            document.head.appendChild(link);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const pathMatch = window.location.pathname.match(/^\/u\/([a-z0-9-]+)$/i);
            const username = pathMatch ? pathMatch[1] : null;

            if (!username) {
                loadThemeCSS('darkgreen');
                return;
            }

            const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            try {
                const { data, error } = await client.from('profiles').select('tree_data').eq('username', username).single();
                if (error) throw error;
                if (data && data.tree_data) {
                    const td = data.tree_data;
                    loadThemeCSS(td.theme);
                    if (td.profile)     renderProfile(td.profile);
                    if (td.socialIcons) renderSocialIcons(td.socialIcons);
                    if (td.videoModule) renderVideoModule(td.videoModule);
                    if (td.links)       renderLinks(td.links);
                }
            } catch (err) {
                loadThemeCSS('darkgreen');
            }
        });

        document.getElementById('share-btn').addEventListener('click', async () => {
            try {
                if (navigator.share) {
                    await navigator.share({ title: document.title, url: window.location.href });
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    const t = document.createElement('div');
                    t.textContent = 'Link kopiert';
                    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 16px;border-radius:8px;z-index:9999;font-family:sans-serif';
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 1800);
                }
            } catch (_) {}
        });
    </script>
</body>
</html>
